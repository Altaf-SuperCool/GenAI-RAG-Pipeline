version: '3.8'

services:
  # Milvus Standalone - Enterprise Vector Database
  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - milvus
    restart: unless-stopped

  # Attu - Milvus Web UI (Optional but recommended)
  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.4
    environment:
      MILVUS_URL: milvus-standalone:19530
    ports:
      - "8000:3000"
    depends_on:
      - milvus-standalone
    networks:
      - milvus
    restart: unless-stopped

networks:
  milvus:
    driver: bridge

volumes:
  milvus_data:
